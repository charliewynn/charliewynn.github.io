<header>
  <nav>
    <ul>
      <li><strong><a href="{{ '/' | relative_url }}">{{ site.title | escape }}</a></strong></li>
    </ul>
    <ul>
      <li><a href="{{ '/' | relative_url }}">Featured</a></li>
      {%- for path in site.header_pages -%}
        {%- assign my_page = site.pages | where: "path", path | first -%}
        {%- if my_page.title -%}
        <li><a href="{{ my_page.url | relative_url }}">{{ my_page.title | escape }}</a></li>
        {%- endif -%}
      {%- endfor -%}
    </ul>
  </nav>
</header>
